version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: zappy-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: identity_db
    ports:
      - "5432:5432"
    volumes:
      - zappy_postgres_data:/var/lib/postgresql/data

volumes:
  zappy_postgres_data: